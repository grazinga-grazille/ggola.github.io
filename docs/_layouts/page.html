---
layout: default
---

<article class="prose">
  <header class="page-header">
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}
      <p class="page-subtitle">{{ page.subtitle }}</p>
    {% endif %}
  </header>

  <div class="page-content">
    {{ content }}
  </div>
</article>

<style>
  .page-header {
    padding: 2.5rem 0 1.5rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2rem;
  }

  .page-header h1 {
    font-size: 2rem;
    font-weight: 700;
    margin: 0 0 0.5rem;
  }

  .page-subtitle {
    color: var(--muted);
    font-size: 1.05rem;
    margin: 0;
  }

  .page-content {
    max-width: 680px;
  }
</style>
