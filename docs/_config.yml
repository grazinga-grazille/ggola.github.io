# ── Site Settings ──────────────────────────────────────────────────────────────
title: My Blog
author: Gatik Gola
email: gola.gatik@gmail.com
description: >-
  A personal blog about code, ideas, and things I find interesting.
baseurl: "/ggola.github.io"   # subpath for project pages
url: "https://grazinga-grazille.github.io/ggola.github.io/"       # e.g. https://yourdomain.com

# ── Social ─────────────────────────────────────────────────────────────────────
github_username:  grazinga-grazille
linkedin_username:  gatik-gola

# ── Build ──────────────────────────────────────────────────────────────────────
theme: minima
plugins:
  - jekyll-feed

# ── Pagination (optional — requires jekyll-paginate gem) ───────────────────────
# paginate: 6
# paginate_path: "/page:num/"

# ── Defaults ───────────────────────────────────────────────────────────────────
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: pages
    values:
      layout: page

# ── Exclude ────────────────────────────────────────────────────────────────────
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .bundle/
  - .sass-cache/
  - node_modules/
