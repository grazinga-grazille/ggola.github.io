# ── Site Settings ──────────────────────────────────────────────────────────────
title: My Blog
description: >-
  A personal blog about code, ideas, and things I find interesting.
baseurl: "/ggola.github.io"
url: "https://grazinga-grazille.github.io"

# ── Author ──────────────────────────────────────────────────────────────────────
author:
  name: "Gatik Gola"
  email: "gola.gatik@gmail.com"
  bio: "Data Scientist & ML Engineer"
  links:
    - label: "GitHub"
      icon: "fas fa-fw fa-link"
      url: "https://github.com/grazinga-grazille"
    - label: "LinkedIn"
      icon: "fas fa-fw fa-link"
      url: "https://www.linkedin.com/in/gatik-gola"
    - label: "Publication"
      icon: "fas fa-fw fa-link"
      url: "https://doi.org/10.1002/mp.70179"

# ── Theme ───────────────────────────────────────────────────────────────────────
remote_theme: mmistakes/minimal-mistakes
minimal_mistakes_skin: "default"

# ── Plugins ─────────────────────────────────────────────────────────────────────
plugins:
  - jekyll-feed
  - jekyll-remote-theme
  - jekyll-include-cache

# ── Defaults ───────────────────────────────────────────────────────────────────
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      show_date: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# ── Exclude ────────────────────────────────────────────────────────────────────
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .bundle/
  - .sass-cache/
  - node_modules/
